services:
  visflow:
    build: .
    container_name: visflow-mm
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
    command: >
      streamlit run app.py
      --server.port=8501
      --server.address=0.0.0.0
      --server.runOnSave=true
    env_file:
      - .env
  
    shm_size: "4gb"