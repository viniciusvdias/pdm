<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" role="img" aria-label="Pipeline Ray vs Dask">
  <defs>
    <linearGradient id="pbg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="800" height="200" rx="10" fill="url(#pbg)" stroke="#cbd5e1"/>
  <text x="400" y="28" text-anchor="middle" fill="#334155" font-family="system-ui,sans-serif" font-size="14" font-weight="600">Pipeline de benchmark (1 VM)</text>
  <!-- boxes -->
  <rect x="24" y="70" width="110" height="56" rx="8" fill="#fff" stroke="#94a3b8"/>
  <text x="79" y="94" text-anchor="middle" fill="#334155" font-family="system-ui,sans-serif" font-size="11" font-weight="600">SNAP</text>
  <text x="79" y="110" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="9">Orkut TXT</text>
  <rect x="160" y="70" width="110" height="56" rx="8" fill="#fff" stroke="#94a3b8"/>
  <text x="215" y="94" text-anchor="middle" fill="#334155" font-family="system-ui,sans-serif" font-size="11" font-weight="600">CSR</text>
  <text x="215" y="110" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="9">numpy in-memory</text>
  <rect x="310" y="55" width="95" height="86" rx="8" fill="#0284c7" stroke="#0369a1"/>
  <text x="357" y="88" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="11" font-weight="600">Ray LPA</text>
  <text x="357" y="104" text-anchor="middle" fill="#bae6fd" font-family="system-ui,sans-serif" font-size="9">@ray.remote</text>
  <text x="357" y="118" text-anchor="middle" fill="#bae6fd" font-family="system-ui,sans-serif" font-size="9">6 chunks</text>
  <rect x="430" y="55" width="95" height="86" rx="8" fill="#7c3aed" stroke="#6d28d9"/>
  <text x="477" y="88" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="11" font-weight="600">Dask LPA</text>
  <text x="477" y="104" text-anchor="middle" fill="#ddd6fe" font-family="system-ui,sans-serif" font-size="9">Client.submit</text>
  <text x="477" y="118" text-anchor="middle" fill="#ddd6fe" font-family="system-ui,sans-serif" font-size="9">LocalCluster</text>
  <rect x="560" y="70" width="100" height="56" rx="8" fill="#fff" stroke="#94a3b8"/>
  <text x="610" y="94" text-anchor="middle" fill="#334155" font-family="system-ui,sans-serif" font-size="11" font-weight="600">metrics</text>
  <text x="610" y="110" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="9">CSV + log</text>
  <rect x="690" y="70" width="90" height="56" rx="8" fill="#059669" stroke="#047857"/>
  <text x="735" y="98" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="11" font-weight="600">report</text>
  <text x="735" y="114" text-anchor="middle" fill="#a7f3d0" font-family="system-ui,sans-serif" font-size="9">.md</text>
  <!-- arrows -->
  <line x1="134" y1="98" x2="158" y2="98" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="270" y1="98" x2="308" y2="98" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="405" y1="98" x2="428" y2="98" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="525" y1="98" x2="558" y2="98" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="660" y1="98" x2="688" y2="98" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="400" y="168" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="10">Ray e Dask correm em sequęncia (mesmo grafo, mesmas seeds)  comparaçăo justa</text>
</svg>
