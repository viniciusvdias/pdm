services:
  kafka:
    image: apache/kafka:3.7.0
    hostname: kafka
    container_name: kafka
    ports:
      - "${KAFKA_PORT_EXTERNAL}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:29092,CONTROLLER://:9093,PLAINTEXT_HOST://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:${KAFKA_PORT_EXTERNAL}
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: ${KAFKA_REPLICATION_FACTOR}
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: ${KAFKA_REPLICATION_FACTOR}
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 5s
      timeout: 5s
      retries: 10

  spark-consumer:
    build: ./src/spark_consumer
    image: g10-spark-consumer:3.5.1
    container_name: spark_consumer
    user: root
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_TOPIC=${KAFKA_TOPIC}
      - WINDOW_DURATION=${WINDOW_DURATION_NUMERIC} ${WINDOW_DURATION_UNIT}
      - WINDOW_SLIDE_DURATION=${WINDOW_SLIDE_DURATION_NUMERIC} ${WINDOW_SLIDE_DURATION_UNIT}
      - MODEL_NAME=${MODEL_NAME}
      - SQLITE_DB_PATH=/data/analytics.sqlite3
    ports:
      - "4040:4040"
    volumes:
      - ./misc:/misc
      - spark_checkpoint:/checkpoint
      - sqlite_data:/data
    working_dir: /app
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'spark-submit .*main.py' >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: >
      /opt/spark/bin/spark-submit
      main.py

  sqlite-init:
    build: ./src/spark_consumer
    image: g10-spark-consumer:3.5.1
    container_name: sqlite_init
    user: root
    environment:
      - SQLITE_DB_PATH=/data/analytics.sqlite3
    volumes:
      - sqlite_data:/data
    working_dir: /app
    command: >
      python3.9 sqlite_store.py --init-only
    restart: "no"

  producer:
    build: ./src/producer
    container_name: wikimedia_producer
    restart: always
    depends_on:
      - kafka
    environment:
      - PYTHONUNBUFFERED=1
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_TOPIC=${KAFKA_TOPIC}
      - WIKIMEDIA_URL=${WIKIMEDIA_URL}
      - PRODUCER_SOURCE=${PRODUCER_SOURCE:-live}
      - WIKIMEDIA_SAMPLE_PATH=/sample/wikimedia-recentchange-sample.txt
      - PRODUCER_SAMPLE_DELAY_SECONDS=${PRODUCER_SAMPLE_DELAY_SECONDS:-0}
    volumes:
      - ./datasample:/sample:ro

  dashboard:
    build: ./src/dashboard
    image: g10-dashboard:latest
    container_name: wikimedia_dashboard
    restart: unless-stopped
    depends_on:
      - sqlite-init
    ports:
      - "8501:8501"
    environment:
      - SQLITE_DB_PATH=/data/analytics.sqlite3
      - REFRESH_INTERVAL_SECONDS=30
    volumes:
      - sqlite_data:/data

volumes:
  kafka_data:
  spark_checkpoint:
  sqlite_data: