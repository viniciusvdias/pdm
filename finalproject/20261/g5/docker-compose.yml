services:

  db-neo4j:
    image: neo4j:5.18-community
    container_name: g5-neo4j
    environment:
      NEO4J_AUTH: neo4j/g5password
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 2G
      NEO4J_dbms_memory_pagecache_size: 1G
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s
    networks:
      - g5net

  injector-job:
    build:
      context: ./src/injector
    container_name: g5-injector
    environment:
      NEO4J_URI: bolt://db-neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: g5password
      DATA_DIR: /data
      BATCH_SIZE: "500"
    volumes:
      - ./datasample:/data
    depends_on:
      db-neo4j:
        condition: service_healthy
    networks:
      - g5net
    restart: "no"

  api-gateway:
    build:
      context: ./src/api
    container_name: g5-api
    environment:
      NEO4J_URI: bolt://db-neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: g5password
    ports:
      - "3000:3000"
    depends_on:
      db-neo4j:
        condition: service_healthy
      injector-job:
        condition: service_completed_successfully
    networks:
      - g5net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── testes de carga (Etapa 6) ──────────────────────────────────────
  # Executar com: docker compose --profile benchmark run --rm k6
  k6:
    image: grafana/k6:latest
    container_name: g5-k6
    profiles:
      - benchmark
    volumes:
      - ./misc/k6-script.js:/home/k6/test.js
    command: run /home/k6/test.js
    environment:
      API_BASE_URL: http://g5-api:3000
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - g5net

volumes:
  neo4j-data:
  neo4j-logs:

networks:
  g5net:
    driver: bridge
